<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050806">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DE进度">
  <title>DE进度</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" href="icons/icon.svg">
  <link rel="stylesheet" href="styles.css?v=20260628-inputs">
</head>
<body class="theme-universe">
  <div class="ambient" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">DE Progress</p>
        <h1>进度面板</h1>
      </div>
      <div class="header-actions">
        <label class="theme-picker" aria-label="选择主题" title="选择主题">
          <span aria-hidden="true">◎</span>
          <select id="themeSelect">
            <option value="universe">Universe</option>
            <option value="love">Love</option>
            <option value="rainy">Rainy</option>
            <option value="connect">Connect</option>
            <option value="wormhole">Wormhole</option>
            <option value="turbulence">Turbulence</option>
          </select>
        </label>
        <button class="icon-button" id="addModuleButton" type="button" aria-label="添加模块" title="添加模块">
          <span aria-hidden="true">+</span>
        </button>
      </div>
    </header>

    <section class="today-strip" aria-label="今日进度">
      <div>
        <span class="today-label">今天</span>
        <strong id="todayText">--</strong>
      </div>
      <div class="sync-dot" aria-hidden="true"></div>
    </section>

    <section class="module-list" id="moduleList" aria-live="polite"></section>

    <section class="task-stats" id="taskStats">
      <button class="stats-head" id="statsToggle" type="button" aria-expanded="true">
        <div>
          <p class="eyebrow">Data Statistics</p>
          <h2>任务统计</h2>
        </div>
        <span class="stats-chevron" aria-hidden="true">⌄</span>
      </button>

      <div class="stats-summary" id="statsSummary"></div>

      <div class="stats-panel" id="statsPanel">
        <article class="chart-card">
          <div class="chart-head">
            <div>
              <h3>集签进度</h3>
              <p>累计 payslip</p>
              <button type="button" class="target-link" id="payslipTargetButton" data-stat-action="target" data-stat-type="payslip">目标 <span id="payslipTargetText">12</span></button>
            </div>
            <div class="chart-side">
              <div class="chart-actions">
                <button type="button" class="stat-action-button primary" data-stat-action="add" data-stat-type="payslip" aria-label="添加集签数据">+</button>
                <button type="button" class="stat-action-button" data-stat-action="delete" data-stat-type="payslip" aria-label="删除最新集签数据">−</button>
              </div>
            </div>
          </div>
          <div class="line-chart" id="payslipChart" aria-label="集签进度折线图"></div>
        </article>

        <article class="chart-card">
          <div class="chart-head">
            <div>
              <h3>税后薪资</h3>
              <p>每周税后收入</p>
            </div>
            <div class="chart-side">
              <div class="chart-actions">
                <button type="button" class="stat-action-button primary" data-stat-action="add" data-stat-type="salary" aria-label="添加薪资数据">+</button>
                <button type="button" class="stat-action-button" data-stat-action="delete" data-stat-type="salary" aria-label="删除最新薪资数据">−</button>
              </div>
            </div>
          </div>
          <div class="bar-chart" id="salaryChart" aria-label="每周税后薪资柱状图"></div>
        </article>

        <article class="chart-card">
          <div class="chart-head">
            <div>
              <h3>每周工时</h3>
              <p>每周总工时</p>
            </div>
            <div class="chart-side">
              <div class="chart-actions">
                <button type="button" class="stat-action-button primary" data-stat-action="add" data-stat-type="hours" aria-label="添加工时数据">+</button>
                <button type="button" class="stat-action-button" data-stat-action="delete" data-stat-type="hours" aria-label="删除最新工时数据">−</button>
              </div>
            </div>
          </div>
          <div class="hours-chart" id="hoursChart" aria-label="每周工时柱状图"></div>
        </article>
      </div>
    </section>
  </main>

  <div class="module-dialog" id="moduleDialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle" hidden>
    <form id="moduleForm">
      <div class="dialog-head">
        <h2 id="dialogTitle">添加模块</h2>
        <button class="plain-button" type="button" id="closeDialogButton" aria-label="关闭">×</button>
      </div>

      <label>
        <span>名称</span>
        <input id="titleInput" name="title" maxlength="18" required autocomplete="off">
      </label>

      <label>
        <span>图标</span>
        <input id="iconInput" name="icon" maxlength="4" required autocomplete="off">
      </label>

      <div class="date-grid">
        <label>
          <span>开始日期</span>
          <input id="startInput" name="start" type="date" required>
        </label>
        <label>
          <span>结束日期</span>
          <input id="endInput" name="end" type="date" required>
        </label>
      </div>

      <fieldset>
        <legend>颜色</legend>
        <div class="color-row" id="colorRow"></div>
      </fieldset>

      <label class="toggle-line">
        <span>今日呼吸</span>
        <input id="pulseInput" name="pulse" type="checkbox">
      </label>

      <label class="toggle-line">
        <span>折叠显示</span>
        <input id="collapsedInput" name="collapsed" type="checkbox">
      </label>

      <menu class="dialog-actions">
        <button class="danger-button" type="button" id="deleteButton">删除</button>
        <span></span>
        <button class="secondary-button" type="button" id="cancelButton">取消</button>
        <button class="primary-button" value="confirm" type="submit">保存</button>
      </menu>
    </form>
  </div>

  <div class="module-dialog" id="statDialog" role="dialog" aria-modal="true" aria-labelledby="statDialogTitle" hidden>
    <form id="statForm">
      <div class="dialog-head">
        <h2 id="statDialogTitle">添加数据</h2>
        <button class="plain-button" type="button" id="closeStatDialogButton" aria-label="关闭">×</button>
      </div>

      <label id="statDateField">
        <span>日期</span>
        <input id="statDateInput" name="date" type="date" required>
      </label>

      <label>
        <span id="statValueLabel">数值</span>
        <input id="statValueInput" name="value" type="number" step="0.01" min="0" required inputmode="decimal">
      </label>

      <menu class="dialog-actions">
        <span></span>
        <span></span>
        <button class="secondary-button" type="button" id="cancelStatButton">取消</button>
        <button class="primary-button" value="confirm" type="submit">保存</button>
      </menu>
    </form>
  </div>

  <template id="moduleTemplate">
    <article class="progress-card">
      <button class="card-edit" type="button" aria-label="编辑模块">
        <div class="card-head">
          <div class="title-block">
            <span class="module-icon"></span>
            <div>
              <h2 class="module-title"></h2>
              <p class="module-range"></p>
            </div>
          </div>
          <div class="ring" aria-hidden="true">
            <svg viewBox="0 0 44 44">
              <circle class="ring-track" cx="22" cy="22" r="18"></circle>
              <circle class="ring-value" cx="22" cy="22" r="18"></circle>
            </svg>
            <span class="ring-text"></span>
          </div>
        </div>
        <div class="dot-grid"></div>
        <div class="card-foot">
          <span class="day-count"></span>
          <span class="percent-text"></span>
        </div>
      </button>
    </article>
  </template>

  <script src="app.js?v=20260628-inputs"></script>
</body>
</html>
